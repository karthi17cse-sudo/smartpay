{% extends 'layout.html' %}

{% block content %}

<div class="auth-container">

    <div class="auth-box">

        <h1>
            Add Money
        </h1>

        <form method="POST">

            <input type="number"
                   step="0.01"
                   name="amount"
                   placeholder="Enter Amount"
                   required>

            <button type="submit">
                Add Money
            </button>

        </form>

    </div>

</div>

{% endblock %}
